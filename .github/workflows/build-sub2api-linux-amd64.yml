name: build-sub2api-linux-amd64

on:
  push:
    branches:
      - y0914/openai-implicit-sticky
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run tests
        run: go test ./...

      - name: Build linux amd64 binary
        run: |
          mkdir -p ../dist
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o ../dist/sub2api-linux-amd64 ./cmd/server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-linux-amd64
          path: dist/sub2api-linux-amd64
          if-no-files-found: error
