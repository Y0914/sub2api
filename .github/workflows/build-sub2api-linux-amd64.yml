name: build-sub2api-linux-amd64

on:
  push:
    branches:
      - y0914/openai-implicit-sticky
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

      - name: Prepare embedded frontend assets
        run: |
          rm -rf backend/internal/web/dist
          mkdir -p backend/internal/web/dist
          cp -a frontend/dist/. backend/internal/web/dist/
          test -f backend/internal/web/dist/index.html

      - name: Run backend tests
        working-directory: backend
        run: go test ./...

      - name: Build embedded linux amd64 binary
        working-directory: backend
        run: |
          mkdir -p ../dist
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -tags=embed -trimpath -ldflags="-s -w" -o ../dist/sub2api-linux-amd64 ./cmd/server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-linux-amd64
          path: dist/sub2api-linux-amd64
          if-no-files-found: error
