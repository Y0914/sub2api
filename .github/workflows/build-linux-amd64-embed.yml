name: Build linux amd64 (embed frontend)

on:
  workflow_dispatch:
  push:
    branches: [y0914/openai-implicit-sticky-0125]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Build frontend dist
        run: |
          set -euxo pipefail
          cd frontend
          pnpm install
          pnpm build
          test -f ../backend/internal/web/dist/index.html

      - name: Build backend linux amd64 (embed)
        working-directory: backend
        run: |
          ls -lah go.sum
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags=embed -ldflags='-s -w' -o ../sub2api-linux-amd64 ./cmd/server

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-linux-amd64
          path: sub2api-linux-amd64
